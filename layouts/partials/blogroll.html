<li class="post-blogroll">
  <div class="blogroll-header">
    <span class="blogroll-label">Ebenfalls lesenswert</span>
    <button class="blogroll-refresh" onclick="renderBlogroll()">↻ andere</button>
  </div>
  <ul class="blogroll-list" id="blogroll-list"></ul>
</li>

<script>
  const blogroll = [
    { name: "kottke.org",               url: "https://kottke.org" },
    { name: "Pluralistic",              url: "https://pluralistic.net" },
    { name: "Daring Fireball",          url: "https://daringfireball.net" },
    { name: "404 Media",                url: "https://www.404media.co" },
    { name: "Platformer",               url: "https://www.platformer.news" },
    { name: "Garbage Day",              url: "https://www.garbageday.email" },
    { name: "The Markup",               url: "https://themarkup.org" },
    { name: "Übermedien",               url: "https://uebermedien.de" },
    { name: "Netzpolitik",              url: "https://netzpolitik.org" },
    { name: "Medieninsider",            url: "https://medieninsider.com" },
    { name: "Krautreporter",            url: "https://krautreporter.de/" },
    { name: "Internet Observatorium",   url: "https://internetobservatorium.substack.com" },
    { name: "Anil Dash",                url: "https://www.anildash.com" },
    { name: "Dirk von Gehlen",          url: "https://www.dirkvongehlen.de" },
    { name: "Johannes Klingebiel",      url: "https://klingebeil.substack.com" },
    { name: "Stratechery",              url: "https://stratechery.com" },
  ];

  const SHOW = 5;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderBlogroll() {
    const list = document.getElementById("blogroll-list");
    const picked = shuffle(blogroll).slice(0, SHOW);
    list.innerHTML = picked.map(s => `
      <li class="blogroll-item">
        <a class="blogroll-link" href="${s.url}" target="_blank" rel="noopener noreferrer">
          <span class="blogroll-name">${s.name}</span>
          <span class="blogroll-url">${new URL(s.url).hostname}</span>
        </a>
      </li>
    `).join("");
  }

  renderBlogroll();
</script>
